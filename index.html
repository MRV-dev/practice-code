      img{
        position: relative;
        right: 300px;
        top: 100px;
        height: 500px;
        width: 500px;
        animation: puppy 1.4s infinite;
      }

      @keyframes puppy {
     0%, 100% { transform: translateX(10px); }
  50% { transform: translateY(10px); }
      }
    </style>
  </head>
<body>

<img src="https://i.pinimg.com/736x/07/c3/0f/07c30f2d04b17e62f1bba911a4bf0577.jpg" alt="">

<script>
  const path = document.querySelector('path');
  const length = path.getTotalLength();

  path.style.strokeDasharray = length;
  path.style.strokeDashoffset = length;

  const duration = 2000;
  const reverseDelay = 500;
  let startTime = Date.now();
  let phase = 'draw';

  function animate(){
    let elapsed = Date.now() - startTime;

    if (phase === 'draw') {
     const progress = elapsed / duration;

      if (progress < 1){
        path.style.strokeDashoffset = length * (1 - progress);
        requestAnimationFrame(animate);
      } else {
        setTimeout(() => {
          phase = 'hide';
          startTime = Date.now();
          animate();
        }, reverseDelay);
      }
     }
     else if (phase === 'hide') {
      const progress = elapsed / duration;

       if (progress < 1){
        path.style.strokeDashoffset = length * progress;
        requestAnimationFrame(animate);
      } else {
        // Loop back to draw phase
        setTimeout(() => {
          phase = 'draw';
          startTime = Date.now();
          animate();
        }, reverseDelay);
      }
     }
    }

  animate();
</script>

</body>
